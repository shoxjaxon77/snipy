<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snipy</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <header id="header">
      <div class="header-left">
        <h1>Snipy</h1>
        <p>Developer Snippets</p>
      </div>
      <div class="header-right">
        <button id="btn-new" class="btn-action" title="New Snippet">+</button>
        <button id="btn-import" class="btn-action" title="Import">↓</button>
        <button id="btn-export" class="btn-action" title="Export">↑</button>
      </div>
    </header>

    <main id="main">
      <div id="search-bar"></div>
      <div id="snippets-container" class="snippets-container"></div>
      <div id="empty-state" class="empty-state" style="display: none;">
        <p>No snippets yet</p>
        <p class="empty-state-subtitle">Create your first snippet to get started!</p>
      </div>
    </main>
  </div>

  <input type="file" id="file-input" accept=".json" style="display: none;">

  <script type="module" src="popup.js"></script>
</body>
</html>
